<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI Engineer Portfolio Website">
  <title>AI Engineer Portfolio Website</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Custom CSS Styles -->
  <link rel="stylesheet" href="styles.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#020817',
            foreground: '#f8fafc',
            card: '#0f172a',
            'card-foreground': '#f8fafc',
            input: '#1e293b',
            'input-background': '#0f172a',
            ring: '#3b82f6',
          }
        }
      }
    }
  </script>
</head>
<body class="dark min-h-screen bg-background text-foreground relative overflow-x-hidden">

  <!-- Interactive Particles Canvas Background -->
  <canvas id="bg-canvas" class="fixed inset-0 w-full h-full pointer-events-none z-0"></canvas>

  <!-- Navigation Bar -->
  <header class="fixed top-0 left-0 w-full bg-slate-950/60 backdrop-blur-md border-b border-slate-800/50 z-50 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="#hero" class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent tracking-wider hover:opacity-80 transition-opacity">
        PORTFOLIO
      </a>
      <nav class="hidden md:flex space-x-8 text-sm font-medium text-slate-300">
        <a href="#about" class="hover:text-blue-400 transition-colors">About</a>
        <a href="#skills" class="hover:text-blue-400 transition-colors">Tech Stack</a>
        <a href="#experience" class="hover:text-blue-400 transition-colors">Experience</a>
        <a href="#projects" class="hover:text-blue-400 transition-colors">Projects</a>
        <a href="#contact" class="hover:text-blue-400 transition-colors">Contact</a>
      </nav>
      <!-- Mobile menu trigger -->
      <button id="mobile-menu-btn" class="md:hidden text-slate-300 hover:text-white transition-colors" aria-label="Toggle Menu">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
    </div>
    
    <!-- Mobile nav menu -->
    <div id="mobile-nav" class="hidden md:hidden bg-slate-950/95 border-b border-slate-800 px-6 py-4 space-y-4 text-center">
      <a href="#about" class="block text-slate-300 hover:text-blue-400 transition-colors py-2">About</a>
      <a href="#skills" class="block text-slate-300 hover:text-blue-400 transition-colors py-2">Tech Stack</a>
      <a href="#experience" class="block text-slate-300 hover:text-blue-400 transition-colors py-2">Experience</a>
      <a href="#projects" class="block text-slate-300 hover:text-blue-400 transition-colors py-2">Projects</a>
      <a href="#contact" class="block text-slate-300 hover:text-blue-400 transition-colors py-2">Contact</a>
    </div>
  </header>

  <!-- Main Wrapper -->
  <main class="relative z-10 pt-16">
  
    <!-- Section 1: Hero -->
    <section id="hero" class="min-h-screen flex items-center justify-center px-6 relative"></section>

    <!-- Section 2: About Me -->
    <section id="about" class="py-20 px-6 reveal"></section>

    <!-- Section 3: Tech Stack -->
    <section id="skills" class="py-20 px-6 reveal"></section>

    <!-- Section 4: Experience Timeline -->
    <section id="experience" class="py-20 px-6 reveal"></section>

    <!-- Section 5: Featured Projects -->
    <section id="projects" class="py-20 px-6 reveal"></section>

    <!-- Section 6: Contact -->
    <section id="contact" class="py-20 px-6 reveal"></section>

  </main>

  <!-- Data and Application Logic Scripts -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
